name:python Tests
on:
    Push:
        branches:
            -main
    Pull_request:
        branches:
            -main

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
                uses: actions/checkout@v4
            
            - name: Setup Python
                users: actions/setup-python@v4
                with:
                    python-version: 3.11

            - name: Install dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install -r requirements.txt
            
                    
                